name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.4'

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Run project checks
        run: composer check

      - name: Lint PHP files
        run: find . -path './vendor' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Enforce source-only policy
        run: |
          test -z "$(git ls-files '*.zip')"
          test -z "$(git ls-files 'vendor/**')"

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build plugin package
        run: |
          scripts/build-release.sh
          mkdir -p build
          unzip -q dist/viazen-mailersend-smtp.zip -d build

      - name: Run WordPress Plugin Check
        uses: WordPress/plugin-check-action@18573eb38f13543484a1f095672dae3849a4fbb0 # v1.1.6
        with:
          build-dir: ./build/viazen-mailersend-smtp
          repo-token: ''
          strict: true
